<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlackCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Fast Minecraft Web Launcher">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root {
    --bg-0: #060606;
    --bg-1: #111111;
    --bg-2: #1a1a1a;
    --surface: rgba(16, 16, 16, 0.82);
    --surface-border: rgba(255, 255, 255, 0.26);
    --card: rgba(12, 12, 12, 0.75);
    --card-border: rgba(255, 255, 255, 0.2);
    --text: #f7f7f7;
    --muted: #b9b9b9;
    --shadow: rgba(0, 0, 0, 0.58);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    font-family: "Sora", "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.09), transparent 34%),
        radial-gradient(circle at 86% 10%, rgba(255, 255, 255, 0.07), transparent 32%),
        radial-gradient(circle at 78% 82%, rgba(255, 255, 255, 0.05), transparent 38%),
        linear-gradient(138deg, var(--bg-2), var(--bg-1) 45%, var(--bg-0));
    background-size: 120% 120%;
    overflow: hidden;
    animation: ambientShift 18s ease-in-out infinite;
}

body::before,
body::after {
    content: "";
    position: fixed;
    z-index: -1;
    pointer-events: none;
}

body::before {
    inset: 0;
    background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(circle at 50% 45%, black 35%, transparent 90%);
}

body::after {
    width: 56vw;
    height: 56vw;
    right: -20vw;
    bottom: -24vw;
    border-radius: 48% 52% 43% 57%;
    background: rgba(255, 255, 255, 0.11);
    filter: blur(68px);
    animation: drift 12s ease-in-out infinite;
}

.container {
    position: relative;
    width: min(1020px, 100%);
    max-height: calc(100dvh - 28px);
    padding: 24px;
    border-radius: 24px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    backdrop-filter: blur(14px);
    box-shadow: 0 30px 55px var(--shadow);
    overflow: hidden;
    animation: panelIn 760ms cubic-bezier(0.2, 0.8, 0.22, 1);
    display: flex;
    flex-direction: column;
}

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.11), transparent 34%),
        linear-gradient(300deg, rgba(255, 255, 255, 0.08), transparent 40%);
}

.container::after {
    content: "";
    position: absolute;
    inset: -150% -80%;
    pointer-events: none;
    background: linear-gradient(120deg, transparent 44%, rgba(255, 255, 255, 0.13) 50%, transparent 56%);
    animation: sheen 4.8s linear infinite;
}

.header-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-bottom: 12px;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 999px;
    background: rgba(31, 31, 31, 0.78);
    color: #f3f3f3;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.98;
    margin-bottom: 10px;
    text-wrap: balance;
}

.subtitle {
    max-width: 640px;
    color: var(--muted);
    margin-bottom: 18px;
    font-size: 1.01rem;
    line-height: 1.5;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
}

.btn {
    display: grid;
    gap: 8px;
    text-align: left;
    width: 100%;
    min-height: 84px;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: transform 170ms ease, border-color 170ms ease, background 170ms ease, box-shadow 170ms ease, filter 170ms ease;
    animation: cardRise 580ms ease both;
    transform-origin: center;
}

.btn:hover {
    transform: translateY(-4px) scale(1.01);
    border-color: rgba(255, 255, 255, 0.58);
    background: rgba(24, 24, 24, 0.92);
    box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5), 0 0 22px rgba(255, 255, 255, 0.2);
    filter: brightness(1.06);
}

.btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.36);
}

.btn .title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
}

.btn .meta {
    font-size: 0.79rem;
    color: #d5d5d5;
    font-family: "IBM Plex Mono", monospace;
    letter-spacing: 0.03em;
    text-transform: uppercase;
}

.primary {
    border-color: rgba(255, 255, 255, 0.58);
    background: linear-gradient(130deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
}

.primary .meta {
    color: #ededed;
}

.footer-row {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 12px;
    align-items: center;
}

.servers-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: 11px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    color: #f4f4f4;
    background: rgba(23, 23, 23, 0.8);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    transition: transform 170ms ease, background 170ms ease, border-color 170ms ease, box-shadow 170ms ease, letter-spacing 170ms ease;
    animation: pulseFade 2.2s ease-in-out infinite;
}

.servers-btn:hover {
    transform: translateY(-2px);
    background: rgba(42, 42, 42, 0.9);
    border-color: rgba(255, 255, 255, 0.75);
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.28);
    letter-spacing: 0.02em;
}

.buttons .btn:nth-child(1) { animation-delay: 60ms; }
.buttons .btn:nth-child(2) { animation-delay: 120ms; }
.buttons .btn:nth-child(3) { animation-delay: 180ms; }
.buttons .btn:nth-child(4) { animation-delay: 240ms; }
.buttons .btn:nth-child(5) { animation-delay: 300ms; }
.buttons .btn:nth-child(6) { animation-delay: 360ms; }

@keyframes panelIn {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes cardRise {
    from {
        opacity: 0;
        transform: translateY(14px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-2vw, -2vw); }
}

@keyframes sheen {
    0% { transform: translateX(-16%); opacity: 0; }
    20% { opacity: 0.9; }
    100% { transform: translateX(16%); opacity: 0; }
}

@keyframes pulseFade {
    0%, 100% { box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
    50% { box-shadow: 0 0 18px rgba(255, 255, 255, 0.2); }
}

@keyframes ambientShift {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
}

@media (max-width: 780px) {
    .container {
        padding: 18px 14px;
        border-radius: 22px;
    }

    .buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    h1 {
        font-size: clamp(1.8rem, 8vw, 3rem);
    }

    .btn {
        min-height: 74px;
        padding: 11px;
    }
}

@media (max-width: 520px) {
    .buttons {
        grid-template-columns: 1fr;
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation: none !important;
        transition: none !important;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header-row">
        <span class="badge">Launcher v2</span>
        <span class="badge">Official Mirrors</span>
    </div>

    <h1>SlackCraft Portal</h1>
    <p class="subtitle">Fast Minecraft Web Launcher</p>

    <div class="buttons">
        <button class="btn primary" onclick="openGameCloaked('https://eaglercraft.dev/clients/Release%201.8.8%20WASM/index.html')">
            <span class="title">Release 1.8.8 (WASM)</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Release%201.12.2%20WASM/index.html')">
            <span class="title">Release 1.12.2 (WASM)</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Release%201.8.8%20JS/index.html')">
            <span class="title">Release 1.8.8 (JS)</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Release%201.12.2%20JS/index.html')">
            <span class="title">Release 1.12.2 (JS)</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Tuff%20Client%20WASM/index.html')">
            <span class="title">TuffClient 1.12.2</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Tuff%20Client%20WASM/index.html')">
            <span class="title">Resent Client 1.8.8</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/EaglerForge%20JS/index.html')">
            <span class="title">EaglerForge 1.8.8</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/PixelClient%201.8.8%20WASM/index.html')">
            <span class="title">PixelClient</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/Astra%20Client%201.6.0%20WASM/index.html')">
            <span class="title">Astra Client 1.8.8</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://eaglercraft.dev/clients/EaglyMC%201.20%20WASM/index.html')">
            <span class="title">EaglyMC 1.20.1</span>
            <span class="meta">Cloaked Tab Launch</span>
        </button>
    </div>

    <div class="footer-row">
        <a class="servers-btn" href="/servers" target="_blank" rel="noopener noreferrer">Multiplayer Servers</a>
    </div>
</div>

<script>
function openGameCloaked(primary) {
    const cloakWindow = window.open("about:blank", "_blank");
    if (!cloakWindow) {
        window.location.assign(primary);
        return;
    }

    cloakWindow.document.open();
    cloakWindow.document.write(`<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Classes</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
iframe{border:0;width:100%;height:100%}
.fallback{position:fixed;left:10px;bottom:10px;padding:8px 12px;border-radius:8px;background:#111827;color:#fff;font:14px/1.2 system-ui,sans-serif;text-decoration:none}
</style>
</head>
<body>
<iframe src="${primary}" allowfullscreen referrerpolicy="no-referrer"></iframe>
<a class="fallback" href="${primary}" target="_self" rel="noopener noreferrer">Open if blocked</a>
</body>
</html>`);
    cloakWindow.document.close();
}

</script>

</body>
</html>
