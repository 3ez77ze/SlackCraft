<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlackCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #0c0f14;
    --accent: #00ff9c;
    --text: #ffffff;
    --muted: #9aa4b2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 16px;
    background: radial-gradient(circle at top, #111827, #020617);
    font-family: system-ui, sans-serif;
    color:var(--text);
}

.container {
    text-align:center;
    width:min(920px, 100%);
    animation: fade 0.6s ease;
}

h1 {
    font-size:2.8rem;
    margin-bottom:10px;
    background: linear-gradient(45deg, #00ff9c, #00cfff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p {
    color:var(--muted);
    margin-bottom:28px;
}

.buttons {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap:14px;
    justify-content:center;
}

.btn {
    width:100%;
    padding:16px 20px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
    transition:0.25s;
}

.btn:hover { transform:translateY(-3px); }

.primary {
    background:var(--accent);
    color:#000;
    box-shadow:0 0 20px rgba(0,255,156,0.4);
}

.secondary {
    background:transparent;
    border:1px solid #2a2f3a;
    color:var(--text);
}

.secondary:hover { border-color:var(--accent); }

.servers-btn {
    margin-top:22px;
    display:inline-block;
    padding:12px 28px;
    border-radius:12px;
    background:#1f2937;
    color:#fff;
    text-decoration:none;
    transition:0.25s;
}

.servers-btn:hover { background:#374151; }

@keyframes fade {
    from {opacity:0; transform:translateY(15px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>SlackCraft</h1>
    <p>Launch from official sources</p>

    <div class="buttons">
        <button class="btn primary" onclick="openGame('https://x.mess.eu.org/ninja-wasm/', 'https://eaglercraft.com/play/')">
            1.8.8 (WASM)
        </button>

        <button class="btn secondary" onclick="openGame('https://x.mess.eu.org/ninja-js/', 'https://eaglercraft.com/play/')">
            1.8.8 (JS)
        </button>

        <button class="btn secondary" onclick="openGame('https://happinessad.github.io/html/a1/', 'https://happinessad.github.io/html/a1/')">
            1.5.2-sp2.01 (FAST)
        </button>

        <button class="btn secondary" onclick="openGame('https://happinessad.github.io/html/a2', 'https://happinessad.github.io/html/a2')">
            22w43 (Classic)
        </button>

        <button class="btn secondary" onclick="openGame('https://happinessad.github.io/html/a3', 'https://happinessad.github.io/html/a3')">
            Precision Client (Enhanced Experience)
        </button>

        <button class="btn secondary" onclick="openGame('https://happinessad.github.io/html/a4', 'https://happinessad.github.io/html/a4')">
            Resent Client (PvP Powerhouse (Modded))
        </button>
    </div>

    <a class="servers-btn" href="/servers" target="_blank" rel="noopener noreferrer">Servers</a>
</div>

<script>
function openGame(primary, fallback) {
    const targetFallback = fallback || primary;
    const cloakWindow = window.open("about:blank", "_blank");
    if (!cloakWindow) {
        const timeout = setTimeout(() => {
            window.location.assign(targetFallback);
        }, 2500);
        window.addEventListener("pagehide", () => clearTimeout(timeout), { once: true });
        window.location.assign(primary);
        return;
    }

    cloakWindow.document.open();
    cloakWindow.document.write(`<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Classes</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
iframe{border:0;width:100%;height:100%}
.fallback{position:fixed;left:10px;bottom:10px;padding:8px 12px;border-radius:8px;background:#111827;color:#fff;font:14px/1.2 system-ui,sans-serif;text-decoration:none}
</style>
</head>
<body>
<iframe src="${primary}" allowfullscreen referrerpolicy="no-referrer"></iframe>
<a class="fallback" href="${primary}" target="_self" rel="noopener noreferrer">Open if blocked</a>
</body>
</html>`);
    cloakWindow.document.close();
    window.location.replace("https://www.google.com/");
}
</script>

</body>
</html>
