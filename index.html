<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlackCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-0: #060c18;
    --bg-1: #0d1a2c;
    --surface: rgba(9, 19, 36, 0.72);
    --surface-border: rgba(153, 199, 255, 0.2);
    --text: #f6fbff;
    --muted: #b9c7db;
    --accent: #79f5d1;
    --accent-strong: #3deab8;
    --shadow: rgba(0, 0, 0, 0.48);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
    font-family: "Space Grotesk", "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at 12% 18%, rgba(121, 245, 209, 0.16), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(134, 171, 255, 0.16), transparent 35%),
        linear-gradient(145deg, var(--bg-1), var(--bg-0));
    overflow-x: hidden;
}

body::before,
body::after {
    content: "";
    position: fixed;
    width: 34vw;
    height: 34vw;
    border-radius: 50%;
    filter: blur(55px);
    z-index: -1;
    animation: floatBlob 11s ease-in-out infinite;
}

body::before {
    top: -14vw;
    left: -8vw;
    background: rgba(121, 245, 209, 0.12);
}

body::after {
    right: -10vw;
    bottom: -16vw;
    background: rgba(104, 139, 255, 0.13);
    animation-delay: -4s;
}

.container {
    width: min(920px, 100%);
    padding: 36px;
    border-radius: 24px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    backdrop-filter: blur(16px);
    box-shadow: 0 28px 50px var(--shadow);
    text-align: center;
    animation: panelIn 700ms cubic-bezier(0.2, 0.8, 0.22, 1);
}

h1 {
    font-size: clamp(2.2rem, 5.7vw, 3.4rem);
    letter-spacing: -0.035em;
    margin-bottom: 10px;
    color: #ffffff;
}

.subtitle {
    color: var(--muted);
    margin-bottom: 28px;
    font-size: 1.05rem;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
}

.btn {
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 0.98rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
    background: rgba(13, 28, 50, 0.86);
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    animation: cardRise 540ms ease both;
}

.btn:hover {
    transform: translateY(-4px);
    border-color: rgba(121, 245, 209, 0.5);
    background: rgba(16, 36, 62, 0.92);
    box-shadow: 0 10px 24px rgba(8, 19, 34, 0.55);
}

.btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(121, 245, 209, 0.35);
}

.primary {
    background: linear-gradient(110deg, var(--accent), var(--accent-strong));
    color: #032116;
    box-shadow: 0 12px 26px rgba(58, 234, 182, 0.3);
}

.primary:hover {
    border-color: transparent;
    background: linear-gradient(110deg, #8ef7d7, #49eec0);
}

.buttons .btn:nth-child(1) { animation-delay: 60ms; }
.buttons .btn:nth-child(2) { animation-delay: 120ms; }
.buttons .btn:nth-child(3) { animation-delay: 180ms; }
.buttons .btn:nth-child(4) { animation-delay: 240ms; }
.buttons .btn:nth-child(5) { animation-delay: 300ms; }
.buttons .btn:nth-child(6) { animation-delay: 360ms; }

.servers-btn {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 24px;
    border-radius: 12px;
    border: 1px solid rgba(121, 245, 209, 0.35);
    color: var(--text);
    background: rgba(10, 25, 44, 0.64);
    text-decoration: none;
    font-weight: 600;
    transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
}

.servers-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(121, 245, 209, 0.65);
    background: rgba(16, 35, 59, 0.9);
}

@keyframes panelIn {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes cardRise {
    from {
        opacity: 0;
        transform: translateY(16px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes floatBlob {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(2vw, -1.4vw); }
}

@media (max-width: 720px) {
    .container {
        padding: 26px 18px;
        border-radius: 20px;
    }

    .buttons {
        grid-template-columns: 1fr;
    }

    .subtitle {
        margin-bottom: 22px;
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation: none !important;
        transition: none !important;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>SlackCraft</h1>
    <p class="subtitle">Fast launcher with clean tabs and official mirrors</p>

    <div class="buttons">
        <button class="btn primary" onclick="openGame('https://x.mess.eu.org/ninja-wasm/', 'https://eaglercraft.com/play/')">
            1.8.8 (WASM)
        </button>

        <button class="btn" onclick="openGame('https://x.mess.eu.org/ninja-js/', 'https://eaglercraft.com/play/')">
            1.8.8 (JS)
        </button>

        <button class="btn" onclick="openGame('https://happinessad.github.io/html/a1/', 'https://happinessad.github.io/html/a1/')">
            1.5.2-sp2.01 (FAST)
        </button>

        <button class="btn" onclick="openGame('https://happinessad.github.io/html/a2/', 'https://happinessad.github.io/html/a2/')">
            22w43 (Classic)
        </button>

        <button class="btn" onclick="openGame('https://happinessad.github.io/html/a3/', 'https://happinessad.github.io/html/a3/')">
            Precision Client (Enhanced Experience)
        </button>

        <button class="btn" onclick="openGame('https://happinessad.github.io/html/a4/', 'https://happinessad.github.io/html/a4/')">
            Resent Client (PvP Powerhouse (Modded))
        </button>
    </div>

    <a class="servers-btn" href="/servers" target="_blank" rel="noopener noreferrer">Servers</a>
</div>

<script>
function openGame(primary, fallback) {
    const targetFallback = fallback || primary;

    const cloakWindow = window.open("about:blank", "_blank");
    if (!cloakWindow) {
        const timeout = setTimeout(() => {
            window.location.assign(targetFallback);
        }, 2500);
        window.addEventListener("pagehide", () => clearTimeout(timeout), { once: true });
        window.location.assign(primary);
        return;
    }

    cloakWindow.document.open();
    cloakWindow.document.write(`<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Classes</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
iframe{border:0;width:100%;height:100%}
.fallback{position:fixed;left:10px;bottom:10px;padding:8px 12px;border-radius:8px;background:#111827;color:#fff;font:14px/1.2 system-ui,sans-serif;text-decoration:none}
</style>
</head>
<body>
<iframe src="${primary}" allowfullscreen referrerpolicy="no-referrer"></iframe>
<a class="fallback" href="${primary}" target="_self" rel="noopener noreferrer">Open if blocked</a>
</body>
</html>`);
    cloakWindow.document.close();
    window.location.replace("https://www.google.com/");
}
</script>

</body>
</html>
