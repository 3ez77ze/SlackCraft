<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlackCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Fast Minecraft Web Launcher">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root {
    --bg-0: #140f08;
    --bg-1: #251811;
    --bg-2: #3e271b;
    --surface: rgba(28, 20, 14, 0.75);
    --surface-border: rgba(255, 205, 143, 0.24);
    --card: rgba(48, 31, 22, 0.72);
    --card-border: rgba(255, 188, 112, 0.2);
    --text: #fff8ef;
    --muted: #e4cab0;
    --accent: #ff9f45;
    --accent-strong: #ffd16f;
    --accent-cool: #8ef4df;
    --shadow: rgba(0, 0, 0, 0.45);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 36px 16px;
    font-family: "Sora", "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at 10% 12%, rgba(255, 166, 77, 0.28), transparent 30%),
        radial-gradient(circle at 85% 8%, rgba(142, 244, 223, 0.2), transparent 35%),
        radial-gradient(circle at 84% 82%, rgba(255, 214, 122, 0.18), transparent 35%),
        linear-gradient(138deg, var(--bg-2), var(--bg-1) 45%, var(--bg-0));
    overflow-x: hidden;
}

body::before,
body::after {
    content: "";
    position: fixed;
    z-index: -1;
    pointer-events: none;
}

body::before {
    inset: 0;
    background-image:
        linear-gradient(rgba(255, 247, 235, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 247, 235, 0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(circle at 50% 45%, black 35%, transparent 90%);
}

body::after {
    width: 52vw;
    height: 52vw;
    right: -18vw;
    bottom: -24vw;
    border-radius: 48% 52% 43% 57%;
    background: rgba(255, 164, 86, 0.2);
    filter: blur(68px);
    animation: drift 10s ease-in-out infinite;
}

.container {
    position: relative;
    width: min(980px, 100%);
    padding: 34px;
    border-radius: 28px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    backdrop-filter: blur(14px);
    box-shadow: 0 30px 55px var(--shadow);
    overflow: hidden;
    animation: panelIn 760ms cubic-bezier(0.2, 0.8, 0.22, 1);
}

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        linear-gradient(120deg, rgba(255, 191, 121, 0.16), transparent 34%),
        linear-gradient(300deg, rgba(142, 244, 223, 0.14), transparent 38%);
}

.header-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-bottom: 14px;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border: 1px solid rgba(255, 206, 151, 0.38);
    border-radius: 999px;
    background: rgba(77, 47, 29, 0.62);
    color: #ffe7c8;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.98;
    margin-bottom: 10px;
    text-wrap: balance;
}

.subtitle {
    max-width: 640px;
    color: var(--muted);
    margin-bottom: 26px;
    font-size: 1.01rem;
    line-height: 1.5;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
}

.btn {
    display: grid;
    gap: 8px;
    text-align: left;
    width: 100%;
    min-height: 108px;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: transform 170ms ease, border-color 170ms ease, background 170ms ease, box-shadow 170ms ease;
    animation: cardRise 580ms ease both;
}

.btn:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 211, 145, 0.64);
    background: rgba(66, 43, 30, 0.9);
    box-shadow: 0 14px 24px rgba(11, 8, 5, 0.35), 0 0 24px rgba(255, 194, 120, 0.45);
}

.btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 191, 121, 0.36);
}

.btn .title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
}

.btn .meta {
    font-size: 0.79rem;
    color: #ffdca9;
    font-family: "IBM Plex Mono", monospace;
    letter-spacing: 0.03em;
    text-transform: uppercase;
}

.primary {
    border-color: rgba(255, 224, 169, 0.6);
    background: linear-gradient(130deg, rgba(255, 160, 72, 0.42), rgba(255, 209, 111, 0.24));
}

.primary .meta {
    color: #fff1cc;
}

.footer-row {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}

.note {
    color: #e8cfb7;
    font-size: 0.86rem;
}

.servers-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: 11px;
    border: 1px solid rgba(142, 244, 223, 0.42);
    color: #ddfff6;
    background: rgba(25, 48, 44, 0.48);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    transition: transform 170ms ease, background 170ms ease, border-color 170ms ease, box-shadow 170ms ease;
}

.servers-btn:hover {
    transform: translateY(-2px);
    background: rgba(32, 65, 60, 0.72);
    border-color: rgba(142, 244, 223, 0.7);
    box-shadow: 0 0 20px rgba(142, 244, 223, 0.45);
}

.buttons .btn:nth-child(1) { animation-delay: 60ms; }
.buttons .btn:nth-child(2) { animation-delay: 120ms; }
.buttons .btn:nth-child(3) { animation-delay: 180ms; }
.buttons .btn:nth-child(4) { animation-delay: 240ms; }
.buttons .btn:nth-child(5) { animation-delay: 300ms; }
.buttons .btn:nth-child(6) { animation-delay: 360ms; }

@keyframes panelIn {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes cardRise {
    from {
        opacity: 0;
        transform: translateY(14px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-2vw, -2vw); }
}

@media (max-width: 780px) {
    .container {
        padding: 24px 18px;
        border-radius: 22px;
    }

    .buttons {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: clamp(2.05rem, 9.5vw, 3.4rem);
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation: none !important;
        transition: none !important;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header-row">
        <span class="badge">Launcher v2</span>
        <span class="badge">Official Mirrors</span>
    </div>

    <h1>SlackCraft Portal</h1>
    <p class="subtitle">Fast Minecraft Web Launcher</p>

    <div class="buttons">
        <button class="btn primary" onclick="openGameCloaked('https://x.mess.eu.org/ninja-wasm/')">
            <span class="title">1.8.8 WASM</span>
            <span class="meta">Fast Boot - Cloaked Tab</span>
        </button>

        <button class="btn" onclick="openGameCloaked('https://x.mess.eu.org/ninja-js/')">
            <span class="title">1.8.8 JavaScript</span>
            <span class="meta">Compatibility Build - Cloaked Tab</span>
        </button>

        <button class="btn" onclick="openGameNormal('https://happinessad.github.io/html/a1/')">
            <span class="title">1.5.2-sp2.01 Fast</span>
            <span class="meta">Legacy Performance Build</span>
        </button>

        <button class="btn" onclick="openGameNormal('https://happinessad.github.io/html/a2/')">
            <span class="title">22w43 Classic</span>
            <span class="meta">Retro Snapshot Edition</span>
        </button>

        <button class="btn" onclick="openGameNormal('https://happinessad.github.io/html/a3/')">
            <span class="title">Precision Client</span>
            <span class="meta">Enhanced Experience Build</span>
        </button>

        <button class="btn" onclick="openGameNormal('https://happinessad.github.io/html/a4/')">
            <span class="title">Resent Client</span>
            <span class="meta">PvP Modded Variant</span>
        </button>
    </div>

    <div class="footer-row">
        <p class="note">Tip: Cloaked options launch inside an embedded blank-tab wrapper.</p>
        <a class="servers-btn" href="/servers" target="_blank" rel="noopener noreferrer">Open Servers</a>
    </div>
</div>

<script>
function openGameCloaked(primary) {
    const cloakWindow = window.open("about:blank", "_blank");
    if (!cloakWindow) {
        window.location.assign(primary);
        return;
    }

    cloakWindow.document.open();
    cloakWindow.document.write(`<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Classes</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
iframe{border:0;width:100%;height:100%}
.fallback{position:fixed;left:10px;bottom:10px;padding:8px 12px;border-radius:8px;background:#111827;color:#fff;font:14px/1.2 system-ui,sans-serif;text-decoration:none}
</style>
</head>
<body>
<iframe src="${primary}" allowfullscreen referrerpolicy="no-referrer"></iframe>
<a class="fallback" href="${primary}" target="_self" rel="noopener noreferrer">Open if blocked</a>
</body>
</html>`);
    cloakWindow.document.close();
}

function openGameNormal(primary) {
    window.location.assign(primary);
}
</script>

</body>
</html>
